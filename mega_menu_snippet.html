<nav id="sf-menu" style="position:relative; font-family:'Segoe UI',system-ui,sans-serif; display:flex; gap:2px;"></nav>

<style>
    .sf-menu-btn {
        background: transparent;
        border: none;
        color: #d6d7d8;
        font-size: 12.5px;
        font-weight: 500;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 5px 5px 0 0;
        transition: background 0.12s ease, color 0.12s ease;
        white-space: nowrap;
        display: inline-block;
        text-decoration: none;
        position: relative;
    }

    .sf-menu-btn::after {
        content: "";
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 1px;
        height: 2px;
        background: #c8202d;
        transform: scaleX(0);
        transition: transform 0.15s ease;
    }

    .sf-menu-btn:hover,
    .sf-menu-btn.sf-menu-open {
        background: #241416;
        color: #f2f2f3;
    }

    .sf-menu-btn:hover::after,
    .sf-menu-btn.sf-menu-open::after {
        transform: scaleX(1);
    }

    .sf-menu-panel {
        display: block;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        width: auto;
        background: #1b1d1f;
        border: 1px solid #33363a;
        border-top: 2px solid #c8202d;
        border-radius: 2px 8px 8px 8px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45), 0 3px 8px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        padding: 12px 14px;
        min-width: 340px;
        max-width: 1200px;
        /* ← Adjust this value as needed */
        margin: 0 auto;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .sf-menu-panel.sf-menu-visible {
        display: flex;
        gap: 0;
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }

    .sf-menu-col {
        min-width: 120px;
        padding: 0 14px;
        border-left: 1px solid #2a2c2f;
    }

    .sf-menu-col:first-child {
        padding-left: 0;
        border-left: none;
    }

    .sf-menu-col:last-child {
        padding-right: 0;
    }

    .sf-menu-col-title {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #e3495a;
        font-weight: 700;
        margin: 0 0 6px;
    }

    .sf-menu-subgroup {
        margin-bottom: 8px;
    }

    .sf-menu-subgroup:last-child {
        margin-bottom: 0;
    }

    .sf-menu-subgroup-title {
        font-size: 10px;
        color: #8a8f94;
        margin: 0 0 4px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .sf-menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(66px, 1fr));
        gap: 3px;
    }

    .sf-menu-product {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 4px;
        padding: 5px 3px;
        border-radius: 6px;
        text-decoration: none;
        color: #c9cacb;
        border: 1px solid transparent;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
    }

    .sf-menu-product:hover {
        background: #221315;
        border-color: #3a1f22;
        color: #f2f2f3;
    }

    .sf-menu-product img {
        width: 32px;
        height: 32px;
        object-fit: contain;
        background: #0f1011;
        border-radius: 6px;
        flex-shrink: 0;
        padding: 3px;
    }

    .sf-menu-product .sf-menu-product-empty {
        width: 32px;
        height: 32px;
        background: #0f1011;
        border-radius: 6px;
        flex-shrink: 0;
    }

    .sf-menu-product span {
        font-size: 10px;
        line-height: 1.2;
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
    }

    .sf-menu-seeall {
        display: inline-block;
        margin-top: 4px;
        padding: 3px 8px;
        font-size: 10px;
        font-weight: 600;
        color: #c8202d;
        background: #241416;
        border-radius: 14px;
        text-decoration: none;
        transition: background 0.12s ease, color 0.12s ease;
    }

    .sf-menu-seeall:hover {
        background: #c8202d;
        color: #fff;
    }
</style>

<script>
    (function () {
        var MENU_URL = "https://raw.githubusercontent.com/marffinn/sf-shopper-sb-variant-runner/refs/heads/master/menu.json";
        var nav = document.getElementById("sf-menu");
        var openPanel = null;

        var MAX_PRODUCTS_SHOWN = 6;

        function productLink(p) {
            return (
                '<a class="sf-menu-product" href="' + p.url + '">' +
                (p.img
                    ? '<img src="' + p.img + '" loading="lazy" onerror="this.style.display=\'none\'" />'
                    : '<span class="sf-menu-product-empty"></span>') +
                '<span>' + p.name + '</span>' +
                '</a>'
            );
        }

        function seeAllLink(node) {
            if (!node.url) return "";
            return '<a class="sf-menu-seeall" href="' + node.url + '">Zobacz wszystkie (' + node.products.length + ') &rarr;</a>';
        }

        function productGrid(node, gridStyle) {
            var shown = node.products.slice(0, MAX_PRODUCTS_SHOWN);
            var html = '<div class="sf-menu-grid"' + (gridStyle ? ' style="' + gridStyle + '"' : '') + '>' +
                shown.map(productLink).join("") +
                '</div>';
            if (node.products.length > MAX_PRODUCTS_SHOWN) {
                html += seeAllLink(node);
            }
            return html;
        }

        function renderNodeContent(node) {
            if (node.children && node.children.length) {
                return node.children.map(function (child) {
                    return (
                        '<div class="sf-menu-col">' +
                        '<div class="sf-menu-col-title">' + child.name + '</div>' +
                        renderColumnBody(child) +
                        '</div>'
                    );
                }).join("");
            }
            return '<div class="sf-menu-col">' + productGrid(node) + '</div>';
        }

        function renderColumnBody(node) {
            if (node.children && node.children.length) {
                return node.children.map(function (sub) {
                    return (
                        '<div class="sf-menu-subgroup">' +
                        '<div class="sf-menu-subgroup-title">' + sub.name + '</div>' +
                        productGrid(sub, "grid-template-columns:1fr;") +
                        '</div>'
                    );
                }).join("");
            }
            return productGrid(node);
        }

        function closeAll() {
            document.querySelectorAll(".sf-menu-panel").forEach(function (p) { p.classList.remove("sf-menu-visible"); });
            document.querySelectorAll(".sf-menu-btn").forEach(function (b) { b.classList.remove("sf-menu-open"); });
            openPanel = null;
        }

        function buildMenu(tree) {
            tree.forEach(function (node, i) {
                var wrap = document.createElement("div");
                // Removed position: relative - now using nav as positioning context

                var btn = document.createElement("a");
                btn.className = "sf-menu-btn";
                btn.textContent = node.name;
                btn.href = node.url || "#";

                var panel = document.createElement("div");
                panel.className = "sf-menu-panel";
                panel.innerHTML = renderNodeContent(node);

                function openThis() {
                    closeAll();
                    panel.classList.add("sf-menu-visible");
                    btn.classList.add("sf-menu-open");
                    openPanel = panel;
                }

                function scheduleClose() {
                    setTimeout(function () {
                        panel.classList.remove("sf-menu-visible");
                        btn.classList.remove("sf-menu-open");
                    }, 150);
                }

                wrap.addEventListener("mouseenter", openThis);
                wrap.addEventListener("mouseleave", scheduleClose);
                panel.addEventListener("mouseenter", function () {
                    clearTimeout(this.closeTimer);
                });
                panel.addEventListener("mouseleave", scheduleClose);

                wrap.appendChild(btn);
                wrap.appendChild(panel);
                nav.appendChild(wrap);
            });
        }

        document.addEventListener("click", function (e) {
            if (!nav.contains(e.target)) closeAll();
        });

        fetch(MENU_URL)
            .then(function (r) { return r.json(); })
            .then(buildMenu)
            .catch(function (err) { console.error("Menu load failed", err); });
    })();
</script>
