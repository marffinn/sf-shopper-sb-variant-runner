<nav id="sf-menu" style="position:relative; font-family:'Segoe UI',system-ui,sans-serif; display:flex; gap:2px;"></nav>

<style>
    .sf-menu-btn {
        background: transparent;
        border: none;
        color: #d6d7d8;
        font-size: 13.5px;
        font-weight: 500;
        padding: 10px 12px;
        cursor: pointer;
        border-radius: 5px 5px 0 0;
        transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        position: relative;
    }

    .sf-menu-btn::after {
        content: "";
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 1px;
        height: 2px;
        background: #c8202d;
        transform: scaleX(0);
        transition: transform 0.15s ease;
    }

    .sf-menu-chevron {
        width: 8px;
        height: 8px;
        flex-shrink: 0;
        transition: transform 0.18s ease;
        opacity: 0.7;
    }

    .sf-menu-btn:hover {
        background: #241416;
        color: #f2f2f3;
    }

    .sf-menu-btn:hover::after {
        transform: scaleX(1);
    }

    .sf-menu-btn:active {
        background: #180d0e;
        transform: scale(0.97);
    }

    .sf-menu-btn.sf-menu-open {
        background: #2a171a;
        color: #ffffff;
        font-weight: 600;
    }

    .sf-menu-btn.sf-menu-open::after {
        transform: scaleX(1);
        background: #e3495a;
    }

    .sf-menu-btn.sf-menu-open .sf-menu-chevron {
        transform: rotate(180deg);
        opacity: 1;
    }

    .sf-menu-btn:focus-visible {
        outline: 2px solid #c8202d;
        outline-offset: 2px;
    }

    .sf-menu-panel {
        display: block;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: #1b1d1f;
        border: 1px solid #33363a;
        border-top: 2px solid #c8202d;
        border-radius: 8px;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45), 0 3px 8px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        padding: 16px 18px;
        min-width: 340px;
        width: max-content;
        max-width: 900px;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: opacity 0.12s ease, transform 0.12s ease;
    }

    .sf-menu-panel.sf-menu-visible {
        display: flex;
        gap: 0;
        justify-content: space-between;
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }

    .sf-menu-col {
        flex: 1 1 0;
        min-width: 140px;
        padding: 0 16px;
        border-left: 1px solid #2a2c2f;
    }

    .sf-menu-col:first-child {
        padding-left: 0;
        border-left: none;
    }

    .sf-menu-col:last-child {
        padding-right: 0;
    }

    .sf-menu-col-title {
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #e3495a;
        font-weight: 700;
        margin: 0 0 10px;
    }

    .sf-menu-subgroup {
        margin-bottom: 12px;
    }

    .sf-menu-subgroup:last-child {
        margin-bottom: 0;
    }

    .sf-menu-subgroup-title {
        font-size: 11px;
        color: #8a8f94;
        margin: 0 0 6px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
    }

    .sf-menu-grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
        gap: 1px;
        background: #000;
        border: 1px solid #000;
    }

    .sf-menu-grid.sf-menu-grid-single {
        display: flex !important;
        flex-direction: column !important;
    }

    .sf-menu-product {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: flex-start !important;
        width: 100% !important;
        box-sizing: border-box !important;
        text-align: center;
        gap: 6px;
        padding: 10px 6px;
        text-decoration: none;
        color: #c9cacb;
        background: #1b1d1f;
        transition: background 0.12s ease, color 0.12s ease;
    }

    .sf-menu-product:hover {
        background: #241416;
        color: #f2f2f3;
    }

    .sf-menu-product img {
        width: 48px !important;
        height: 48px !important;
        object-fit: contain;
        background: #0f1011;
        border-radius: 4px;
        flex-shrink: 0;
        padding: 4px;
    }

    .sf-menu-product .sf-menu-product-empty {
        width: 48px;
        height: 48px;
        background: #0f1011;
        border-radius: 4px;
        flex-shrink: 0;
    }

    .sf-menu-product span {
        font-size: 11.5px;
        line-height: 1.3;
        font-weight: 500;
    }

    .sf-menu-seeall {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 14px;
        font-size: 11px;
        font-weight: 600;
        color: #c8202d;
        background: #241416;
        border-radius: 20px;
        text-decoration: none;
        transition: all 0.12s ease;
    }

    .sf-menu-seeall:hover {
        background: #c8202d;
        color: #fff;
        transform: translateY(-1px);
    }

    /* ==================== RESPONSIVE DESIGN ==================== */
    @media (max-width: 768px) {
        .sf-menu-panel {
            padding: 14px 12px;
            max-width: 96vw;
            border-radius: 10px;
        }

        .sf-menu-panel.sf-menu-visible {
            flex-wrap: wrap;
        }

        .sf-menu-col {
            min-width: 120px;
            padding: 0 10px;
        }

        .sf-menu-grid {
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
        }

        .sf-menu-product img {
            width: 42px;
            height: 42px;
        }

        .sf-menu-product span {
            font-size: 10.5px;
        }
    }

    @media (max-width: 480px) {
        .sf-menu-btn {
            font-size: 12px;
            padding: 9px 10px;
        }

        .sf-menu-panel {
            padding: 12px 10px;
            top: calc(100% + 4px);
        }

        .sf-menu-grid {
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
        }

        .sf-menu-product img {
            width: 38px;
            height: 38px;
        }

        .sf-menu-product {
            padding: 6px 3px;
        }
    }
</style>

<script>
    (function () {
        var MENU_URL = "https://raw.githubusercontent.com/marffinn/sf-shopper-sb-variant-runner/refs/heads/master/menu.json";
        var nav = document.getElementById("sf-menu");
        var openPanel = null;

        var MAX_PRODUCTS_SHOWN = 6;

        function productLink(p) {
            return (
                '<a class="sf-menu-product" href="' + p.url + '">' +
                (p.img
                    ? '<img src="' + p.img + '" loading="lazy" onerror="this.style.display=\'none\'" />'
                    : '<span class="sf-menu-product-empty"></span>') +
                '<span>' + p.name + '</span>' +
                '</a>'
            );
        }

        function seeAllLink(node) {
            if (!node.url) return "";
            return '<a class="sf-menu-seeall" href="' + node.url + '">Zobacz wszystkie (' + node.products.length + ') &rarr;</a>';
        }

        function productGrid(node, extraClass) {
            var shown = node.products.slice(0, MAX_PRODUCTS_SHOWN);
            var cls = "sf-menu-grid" + (extraClass ? " " + extraClass : "");
            var html = '<div class="' + cls + '">' +
                shown.map(productLink).join("") +
                '</div>';
            if (node.products.length > MAX_PRODUCTS_SHOWN) {
                html += seeAllLink(node);
            }
            return html;
        }

        function renderNodeContent(node) {
            if (node.children && node.children.length) {
                return node.children.map(function (child) {
                    return (
                        '<div class="sf-menu-col">' +
                        '<div class="sf-menu-col-title">' + child.name + '</div>' +
                        renderColumnBody(child) +
                        '</div>'
                    );
                }).join("");
            }
            return '<div class="sf-menu-col">' + productGrid(node) + '</div>';
        }

        function renderColumnBody(node) {
            if (node.children && node.children.length) {
                return node.children.map(function (sub) {
                    return (
                        '<div class="sf-menu-subgroup">' +
                        '<div class="sf-menu-subgroup-title">' + sub.name + '</div>' +
                        productGrid(sub, "sf-menu-grid-single") +
                        '</div>'
                    );
                }).join("");
            }
            return productGrid(node);
        }

        function closeAll() {
            document.querySelectorAll(".sf-menu-panel").forEach(function (p) { p.classList.remove("sf-menu-visible"); });
            document.querySelectorAll(".sf-menu-btn").forEach(function (b) { b.classList.remove("sf-menu-open"); });
            openPanel = null;
        }

        function buildMenu(tree) {
            tree.forEach(function (node) {
                var wrap = document.createElement("div");
                wrap.style.position = "relative";

                var btn = document.createElement("a");
                btn.className = "sf-menu-btn";
                btn.href = node.url || "#";
                btn.innerHTML =
                    '<span>' + node.name + '</span>' +
                    '<svg class="sf-menu-chevron" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

                var panel = document.createElement("div");
                panel.className = "sf-menu-panel";
                panel.innerHTML = renderNodeContent(node);

                var closeTimer = null;

                function openThis() {
                    clearTimeout(closeTimer);
                    closeAll();
                    panel.classList.add("sf-menu-visible");
                    btn.classList.add("sf-menu-open");
                    openPanel = panel;
                }

                function scheduleClose() {
                    clearTimeout(closeTimer);
                    closeTimer = setTimeout(function () {
                        panel.classList.remove("sf-menu-visible");
                        btn.classList.remove("sf-menu-open");
                    }, 180);
                }

                function cancelClose() {
                    clearTimeout(closeTimer);
                }

                wrap.addEventListener("mouseenter", openThis);
                wrap.addEventListener("mouseleave", scheduleClose);
                panel.addEventListener("mouseenter", cancelClose);
                panel.addEventListener("mouseleave", scheduleClose);

                wrap.appendChild(btn);
                wrap.appendChild(panel);
                nav.appendChild(wrap);
            });
        }

        document.addEventListener("click", function (e) {
            if (!nav.contains(e.target)) closeAll();
        });

        fetch(MENU_URL)
            .then(function (r) { return r.json(); })
            .then(buildMenu)
            .catch(function (err) { console.error("Menu load failed", err); });
    })();
</script>
